AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Securitybricks FedRAMP Cloud Compliance Scanner — Client Role for AWS GovCloud.
  Deploy this template in your AWS GovCloud account to grant the Securitybricks
  scanner read-only access for automated FedRAMP Low/Moderate/High compliance scanning.
  The role uses SecurityAudit and targeted read-only policies — it cannot
  modify any resources.

  IMPORTANT: This template must be deployed in an AWS GovCloud region
  (us-gov-west-1 or us-gov-east-1). For commercial AWS accounts, use
  client-role-template.yaml instead.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  ScannerAccountId:
    Type: String
    Description: >-
      The AWS GovCloud account ID where the Securitybricks FedRAMP Scanner
      is deployed. For VM-based assessments, this is your own GovCloud
      account ID (the scanner VM runs in your environment).
      For hosted assessments, Securitybricks will provide this value.
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a valid 12-digit AWS account ID

  ExternalId:
    Type: String
    Description: >-
      Unique external ID for cross-account assume-role security.
      Securitybricks generates this value per-client to prevent
      confused deputy attacks. It will be provided during onboarding.
    MinLength: 16
    MaxLength: 128
    AllowedPattern: "^[a-zA-Z0-9_\\-]+$"
    ConstraintDescription: Alphanumeric characters, hyphens, and underscores only

  RoleName:
    Type: String
    Default: SecuritybricksFedRAMPScannerRole
    Description: Name for the IAM role (customize if needed)
    AllowedPattern: "^[a-zA-Z0-9_+=,.@\\-]+$"
    MaxLength: 64

  SessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 7200
    Description: Maximum session duration in seconds (15 min to 2 hours)

# ---------------------------------------------------------------------------
# Metadata (for CloudFormation console display)
# ---------------------------------------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Securitybricks Configuration
        Parameters:
          - ScannerAccountId
          - ExternalId
      - Label:
          default: Role Configuration (Optional)
        Parameters:
          - RoleName
          - SessionDurationSeconds
    ParameterLabels:
      ScannerAccountId:
        default: Scanner AWS GovCloud Account ID
      ExternalId:
        default: External ID (provided by Securitybricks)
      RoleName:
        default: IAM Role Name
      SessionDurationSeconds:
        default: Maximum Session Duration

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # Cross-Account IAM Role (GovCloud partition)
  # =========================================================================
  FedRAMPScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref SessionDurationSeconds
      Description: >-
        Read-only role for Securitybricks FedRAMP Cloud Compliance Scanner.
        Grants access to audit AWS GovCloud configurations for FedRAMP
        Level 1/2/3 practice compliance without any write permissions.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSecuritybricksCrossAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws-us-gov:iam::${ScannerAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        # SecurityAudit — GovCloud ARN partition
        - arn:aws-us-gov:iam::aws:policy/SecurityAudit
      Tags:
        - Key: Project
          Value: FedRAMP-Scanner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: Securitybricks-FedRAMP-Compliance-Scan
        - Key: AccessLevel
          Value: ReadOnly
        - Key: Environment
          Value: GovCloud

  # =========================================================================
  # Custom Policy — Additional Read-Only API Calls for FedRAMP Scanning
  #
  # These cover specific API calls needed for FedRAMP control validation
  # that are not included in the SecurityAudit managed policy.
  # =========================================================================
  FedRAMPScannerAdditionalReadPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecuritybricksFedRAMPScannerAdditionalRead
      Roles:
        - !Ref FedRAMPScannerRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # -----------------------------------------------------------------
          # IAM and Identity (FedRAMP: AC, IA domains)
          # -----------------------------------------------------------------
          - Sid: IAMCredentialReporting
            Effect: Allow
            Action:
              - iam:GenerateCredentialReport
              - iam:GetCredentialReport
              - iam:GetAccountAuthorizationDetails
              - iam:GetAccountPasswordPolicy
              - iam:ListServiceSpecificCredentials
              - iam:ListSigningCertificates
              - iam:ListMFADevices
              - iam:ListAccessKeys
              - iam:GetAccessKeyLastUsed
              - iam:ListUserPolicies
              - iam:ListAttachedUserPolicies
              - iam:ListGroupsForUser
              - iam:GetLoginProfile
            Resource: "*"

          # -----------------------------------------------------------------
          # Compute and Networking (FedRAMP: SC, CM domains)
          # -----------------------------------------------------------------
          - Sid: ComputeNetworkRead
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSecurityGroupRules
              - ec2:DescribeNetworkAcls
              - ec2:DescribeFlowLogs
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeRouteTables
              - ec2:DescribeVpnConnections
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeVolumes
              - ec2:DescribeSnapshots
              - ec2:DescribeImages
              - ec2:GetEbsEncryptionByDefault
              - ec2:DescribeInstanceAttribute
              - ec2:DescribeClientVpnEndpoints
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeTransitGateways
              - ec2:DescribeTransitGatewayAttachments
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeNatGateways
              - ec2:DescribeSnapshotAttribute
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeSSLPolicies
              - elasticloadbalancing:DescribeLoadBalancerAttributes
            Resource: "*"

          # -----------------------------------------------------------------
          # Storage (FedRAMP: MP, SC domains)
          # -----------------------------------------------------------------
          - Sid: StorageRead
            Effect: Allow
            Action:
              - s3:GetBucketPolicy
              - s3:GetBucketAcl
              - s3:GetBucketVersioning
              - s3:GetBucketLogging
              - s3:GetEncryptionConfiguration
              - s3:GetBucketPublicAccessBlock
              - s3:GetAccountPublicAccessBlock
              - s3:GetBucketPolicyStatus
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:GetBucketTagging
              - s3:GetLifecycleConfiguration
              - s3:GetReplicationConfiguration
              - elasticfilesystem:DescribeFileSystems
            Resource: "*"

          # -----------------------------------------------------------------
          # Database (FedRAMP: SC, MP domains)
          # -----------------------------------------------------------------
          - Sid: DatabaseRead
            Effect: Allow
            Action:
              - rds:DescribeDBInstances
              - rds:DescribeDBClusters
              - rds:DescribeDBSnapshots
              - rds:DescribeDBClusterSnapshots
              - rds:DescribeDBSubnetGroups
              - rds:ListTagsForResource
              - rds:DescribeDBParameterGroups
              - rds:DescribeDBParameters
              - rds:DescribeEventSubscriptions
              - dynamodb:ListTables
              - dynamodb:DescribeTable
              - dynamodb:DescribeContinuousBackups
              - dynamodb:ListTagsOfResource
            Resource: "*"

          # -----------------------------------------------------------------
          # Encryption and Key Management (FedRAMP: SC domain)
          # -----------------------------------------------------------------
          - Sid: KMSRead
            Effect: Allow
            Action:
              - kms:ListKeys
              - kms:ListAliases
              - kms:DescribeKey
              - kms:GetKeyPolicy
              - kms:GetKeyRotationStatus
              - kms:ListResourceTags
            Resource: "*"

          # -----------------------------------------------------------------
          # Logging and Monitoring (FedRAMP: AU, SI domains)
          # -----------------------------------------------------------------
          - Sid: LoggingMonitoringRead
            Effect: Allow
            Action:
              - cloudtrail:DescribeTrails
              - cloudtrail:GetTrailStatus
              - cloudtrail:GetEventSelectors
              - cloudtrail:GetInsightSelectors
              - cloudtrail:LookupEvents
              - logs:DescribeLogGroups
              - logs:DescribeMetricFilters
              - cloudwatch:DescribeAlarms
              - cloudwatch:DescribeAnomalyDetectors
              - config:DescribeConfigRules
              - config:DescribeComplianceByConfigRule
              - config:DescribeConfigurationRecorders
              - config:DescribeConfigurationRecorderStatus
              - config:DescribeDeliveryChannels
              - guardduty:ListDetectors
              - guardduty:GetDetector
              - securityhub:GetEnabledStandards
              - securityhub:DescribeHub
              - securityhub:GetFindings
            Resource: "*"

          # -----------------------------------------------------------------
          # Incident Response (FedRAMP: IR domain)
          # -----------------------------------------------------------------
          - Sid: IncidentResponseRead
            Effect: Allow
            Action:
              - ssm:DescribeAutomationExecutions
              - ssm:ListDocuments
              - ssm:DescribeDocument
              - ssm:GetDocument
              - ssm:DescribeInstanceInformation
              - ssm:DescribePatchBaselines
              - ssm:DescribeInstancePatchStates
              - ssm:ListInventoryEntries
              - sns:ListTopics
              - sns:ListSubscriptionsByTopic
              - sns:GetTopicAttributes
              - events:ListRules
              - events:DescribeRule
              - events:ListTargetsByRule
            Resource: "*"

          # -----------------------------------------------------------------
          # Backup and Recovery (FedRAMP: MP domain)
          # -----------------------------------------------------------------
          - Sid: BackupRead
            Effect: Allow
            Action:
              - backup:ListBackupPlans
              - backup:GetBackupPlan
              - backup:ListBackupVaults
              - backup:DescribeBackupVault
              - backup:ListRecoveryPointsByBackupVault
              - backup:GetBackupVaultAccessPolicy
              - backup:ListRestoreJobs
              - backup:ListCopyJobs
            Resource: "*"

          # -----------------------------------------------------------------
          # Resilience Hub (FedRAMP: CP domain)
          # -----------------------------------------------------------------
          - Sid: ResilienceHubRead
            Effect: Allow
            Action:
              - resiliencehub:ListApps
              - resiliencehub:ListAppAssessments
              - resiliencehub:DescribeApp
            Resource: "*"

          # -----------------------------------------------------------------
          # Organizations and Account (FedRAMP: CA domain)
          # -----------------------------------------------------------------
          - Sid: OrganizationsRead
            Effect: Allow
            Action:
              - organizations:DescribeOrganization
              - organizations:ListAccounts
              - organizations:ListPolicies
              - organizations:DescribePolicy
              - account:GetAlternateContact
              - support:DescribeTrustedAdvisorChecks
              - support:DescribeTrustedAdvisorCheckResult
            Resource: "*"

          # -----------------------------------------------------------------
          # Security Services (FedRAMP: RA, SI domains)
          # Note: Some services (Inspector2, CloudFront) may have limited
          # availability in GovCloud. Checks will gracefully handle missing
          # services and mark them as "manual" review.
          # -----------------------------------------------------------------
          - Sid: SecurityServicesRead
            Effect: Allow
            Action:
              - inspector2:BatchGetAccountStatus
              - inspector2:ListFindings
              - wafv2:ListWebACLs
              - wafv2:GetWebACL
              - network-firewall:ListFirewalls
              - network-firewall:ListFirewallPolicies
              - network-firewall:DescribeFirewallPolicy
              - access-analyzer:ListAnalyzers
            Resource: "*"

          # -----------------------------------------------------------------
          # Web, DNS, and Certificates (FedRAMP: SC domain)
          # Note: CloudFront is NOT available in GovCloud.
          # Route53 is available but runs from commercial partition.
          # -----------------------------------------------------------------
          - Sid: WebDNSCertRead
            Effect: Allow
            Action:
              - acm:ListCertificates
              - acm:DescribeCertificate
              - apigateway:GET
              - ecr:DescribeRepositories
            Resource: "*"

          # -----------------------------------------------------------------
          # Identity Center, CI/CD, Athena (FedRAMP: AC, CM, AU domains)
          # Note: AWS Health API requires Business/Enterprise Support.
          # -----------------------------------------------------------------
          - Sid: IdentityCICDAnalyticsRead
            Effect: Allow
            Action:
              - sso:ListInstances
              - codepipeline:ListPipelines
              - codepipeline:GetPipeline
              - codeguru-reviewer:ListRepositoryAssociations
              - codeguru-reviewer:DescribeRepositoryAssociation
              - athena:ListNamedQueries
              - athena:ListWorkGroups
              - health:DescribeEvents
            Resource: "*"

  # =========================================================================
  # Explicit Deny — Ensure No Write Access
  # =========================================================================
  FedRAMPScannerDenyWritePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecuritybricksFedRAMPScannerDenyWrite
      Roles:
        - !Ref FedRAMPScannerRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyAllMutatingActions
            Effect: Deny
            Action:
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:StopInstances
              - ec2:StartInstances
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - s3:PutObject
              - s3:DeleteObject
              - s3:DeleteBucket
              - s3:PutBucketPolicy
              - rds:DeleteDBInstance
              - rds:CreateDBInstance
              - rds:ModifyDBInstance
              - iam:CreateUser
              - iam:DeleteUser
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:InvokeFunction
              - cloudformation:CreateStack
              - cloudformation:DeleteStack
              - cloudformation:UpdateStack
            Resource: "*"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RoleArn:
    Description: >-
      Provide this ARN to Securitybricks to complete onboarding.
      This is the cross-account role that the FedRAMP Scanner will assume.
    Value: !GetAtt FedRAMPScannerRole.Arn

  ExternalIdUsed:
    Description: External ID configured for this role
    Value: !Ref ExternalId

  RoleName:
    Description: Name of the IAM role created
    Value: !Ref RoleName

  SetupInstructions:
    Description: Next steps after deploying this template
    Value: !Sub >-
      Role created successfully. Provide the Role ARN
      (${FedRAMPScannerRole.Arn}) to your Securitybricks contact.
      They will configure it in the FedRAMP Scanner platform for
      your organization. The scanner will use External ID
      '${ExternalId}' when assuming this role.
