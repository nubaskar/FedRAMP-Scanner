AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Securitybricks CMMC Cloud Compliance Scanner — Client Cross-Account Role.
  Deploy this template in your AWS account to grant Securitybricks read-only
  access for automated CMMC compliance scanning. The role uses SecurityAudit
  and targeted read-only policies — it cannot modify any resources.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  SecuritybricksAccountId:
    Type: String
    Description: >-
      The AWS account ID of Securitybricks' CMMC Scanner platform.
      Securitybricks will provide this value during onboarding.
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a valid 12-digit AWS account ID

  ExternalId:
    Type: String
    Description: >-
      Unique external ID for cross-account assume-role security.
      Securitybricks generates this value per-client to prevent
      confused deputy attacks. It will be provided during onboarding.
    MinLength: 16
    MaxLength: 128
    AllowedPattern: "^[a-zA-Z0-9_\\-]+$"
    ConstraintDescription: Alphanumeric characters, hyphens, and underscores only

  RoleName:
    Type: String
    Default: SecuritybricksCMMCScannerRole
    Description: Name for the IAM role (customize if needed)
    AllowedPattern: "^[a-zA-Z0-9_+=,.@\\-]+$"
    MaxLength: 64

  SessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 7200
    Description: Maximum session duration in seconds (15 min to 2 hours)

# ---------------------------------------------------------------------------
# Metadata (for CloudFormation console display)
# ---------------------------------------------------------------------------
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Securitybricks Configuration
        Parameters:
          - SecuritybricksAccountId
          - ExternalId
      - Label:
          default: Role Configuration (Optional)
        Parameters:
          - RoleName
          - SessionDurationSeconds
    ParameterLabels:
      SecuritybricksAccountId:
        default: Securitybricks AWS Account ID
      ExternalId:
        default: External ID (provided by Securitybricks)
      RoleName:
        default: IAM Role Name
      SessionDurationSeconds:
        default: Maximum Session Duration

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # Cross-Account IAM Role
  # =========================================================================
  CMMCScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref SessionDurationSeconds
      Description: >-
        Read-only role for Securitybricks CMMC Cloud Compliance Scanner.
        Grants access to audit AWS configurations for CMMC Level 1/2/3
        practice compliance without any write permissions.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSecuritybricksCrossAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${SecuritybricksAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        # SecurityAudit provides read access to security-related configurations
        # across IAM, CloudTrail, Config, GuardDuty, KMS, etc.
        - arn:aws:iam::aws:policy/SecurityAudit
      Tags:
        - Key: Project
          Value: CMMC-Scanner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: Securitybricks-CMMC-Compliance-Scan
        - Key: AccessLevel
          Value: ReadOnly

  # =========================================================================
  # Custom Policy — Additional Read-Only API Calls for CMMC Scanning
  #
  # These cover specific API calls needed for CMMC practice validation
  # that are not included in the SecurityAudit managed policy.
  # =========================================================================
  CMMCScannerAdditionalReadPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecuritybricksCMMCScannerAdditionalRead
      Roles:
        - !Ref CMMCScannerRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # -----------------------------------------------------------------
          # IAM and Identity (CMMC: AC, IA domains)
          # -----------------------------------------------------------------
          - Sid: IAMCredentialReporting
            Effect: Allow
            Action:
              - iam:GenerateCredentialReport
              - iam:GetCredentialReport
              - iam:GetAccountAuthorizationDetails
              - iam:GetAccountPasswordPolicy
              - iam:ListServiceSpecificCredentials
              - iam:ListSigningCertificates
              - iam:ListMFADevices
              - iam:ListAccessKeys
              - iam:GetAccessKeyLastUsed
              - iam:ListUserPolicies
              - iam:ListAttachedUserPolicies
              - iam:ListGroupsForUser
              - iam:GetLoginProfile
            Resource: "*"

          # -----------------------------------------------------------------
          # Compute and Networking (CMMC: SC, CM domains)
          # -----------------------------------------------------------------
          - Sid: ComputeNetworkRead
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSecurityGroupRules
              - ec2:DescribeNetworkAcls
              - ec2:DescribeFlowLogs
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeRouteTables
              - ec2:DescribeVpnConnections
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeVolumes
              - ec2:DescribeSnapshots
              - ec2:DescribeImages
              - ec2:GetEbsEncryptionByDefault
              - ec2:DescribeInstanceAttribute
              - ec2:DescribeClientVpnEndpoints
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeTransitGateways
              - ec2:DescribeTransitGatewayAttachments
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeNatGateways
              - ec2:DescribeSnapshotAttribute
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeSSLPolicies
              - elasticloadbalancing:DescribeLoadBalancerAttributes
            Resource: "*"

          # -----------------------------------------------------------------
          # Storage (CMMC: MP, SC domains)
          # -----------------------------------------------------------------
          - Sid: StorageRead
            Effect: Allow
            Action:
              - s3:GetBucketPolicy
              - s3:GetBucketAcl
              - s3:GetBucketVersioning
              - s3:GetBucketLogging
              - s3:GetEncryptionConfiguration
              - s3:GetBucketPublicAccessBlock
              - s3:GetAccountPublicAccessBlock
              - s3:GetBucketPolicyStatus
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:GetBucketTagging
              - s3:GetLifecycleConfiguration
              - s3:GetReplicationConfiguration
              - elasticfilesystem:DescribeFileSystems
            Resource: "*"

          # -----------------------------------------------------------------
          # Database (CMMC: SC, MP domains)
          # -----------------------------------------------------------------
          - Sid: DatabaseRead
            Effect: Allow
            Action:
              - rds:DescribeDBInstances
              - rds:DescribeDBClusters
              - rds:DescribeDBSnapshots
              - rds:DescribeDBClusterSnapshots
              - rds:DescribeDBSubnetGroups
              - rds:ListTagsForResource
              - rds:DescribeDBParameterGroups
              - rds:DescribeDBParameters
              - rds:DescribeEventSubscriptions
              - dynamodb:ListTables
              - dynamodb:DescribeTable
              - dynamodb:DescribeContinuousBackups
              - dynamodb:ListTagsOfResource
            Resource: "*"

          # -----------------------------------------------------------------
          # Encryption and Key Management (CMMC: SC domain)
          # -----------------------------------------------------------------
          - Sid: KMSRead
            Effect: Allow
            Action:
              - kms:ListKeys
              - kms:ListAliases
              - kms:DescribeKey
              - kms:GetKeyPolicy
              - kms:GetKeyRotationStatus
              - kms:ListResourceTags
            Resource: "*"

          # -----------------------------------------------------------------
          # Logging and Monitoring (CMMC: AU, SI domains)
          # -----------------------------------------------------------------
          - Sid: LoggingMonitoringRead
            Effect: Allow
            Action:
              - cloudtrail:DescribeTrails
              - cloudtrail:GetTrailStatus
              - cloudtrail:GetEventSelectors
              - cloudtrail:GetInsightSelectors
              - cloudtrail:LookupEvents
              - logs:DescribeLogGroups
              - logs:DescribeMetricFilters
              - cloudwatch:DescribeAlarms
              - cloudwatch:DescribeAnomalyDetectors
              - config:DescribeConfigRules
              - config:DescribeComplianceByConfigRule
              - config:DescribeConfigurationRecorders
              - config:DescribeConfigurationRecorderStatus
              - config:DescribeDeliveryChannels
              - guardduty:ListDetectors
              - guardduty:GetDetector
              - securityhub:GetEnabledStandards
              - securityhub:DescribeHub
              - securityhub:GetFindings
            Resource: "*"

          # -----------------------------------------------------------------
          # Incident Response (CMMC: IR domain)
          # -----------------------------------------------------------------
          - Sid: IncidentResponseRead
            Effect: Allow
            Action:
              - ssm:DescribeAutomationExecutions
              - ssm:ListDocuments
              - ssm:DescribeDocument
              - ssm:GetDocument
              - ssm:DescribeInstanceInformation
              - ssm:DescribePatchBaselines
              - ssm:DescribeInstancePatchStates
              - ssm:ListInventoryEntries
              - sns:ListTopics
              - sns:ListSubscriptionsByTopic
              - sns:GetTopicAttributes
              - events:ListRules
              - events:DescribeRule
              - events:ListTargetsByRule
            Resource: "*"

          # -----------------------------------------------------------------
          # Backup and Recovery (CMMC: MP domain)
          # -----------------------------------------------------------------
          - Sid: BackupRead
            Effect: Allow
            Action:
              - backup:ListBackupPlans
              - backup:GetBackupPlan
              - backup:ListBackupVaults
              - backup:DescribeBackupVault
              - backup:ListRecoveryPointsByBackupVault
              - backup:GetBackupVaultAccessPolicy
            Resource: "*"

          # -----------------------------------------------------------------
          # Organizations and Account (CMMC: CA domain)
          # -----------------------------------------------------------------
          - Sid: OrganizationsRead
            Effect: Allow
            Action:
              - organizations:DescribeOrganization
              - organizations:ListAccounts
              - organizations:ListPolicies
              - organizations:DescribePolicy
              - account:GetAlternateContact
              - support:DescribeTrustedAdvisorChecks
              - support:DescribeTrustedAdvisorCheckResult
            Resource: "*"

          # -----------------------------------------------------------------
          # Security Services (CMMC: RA, SI domains)
          # -----------------------------------------------------------------
          - Sid: SecurityServicesRead
            Effect: Allow
            Action:
              - inspector2:BatchGetAccountStatus
              - inspector2:ListFindings
              - wafv2:ListWebACLs
              - wafv2:GetWebACL
              - network-firewall:ListFirewalls
              - network-firewall:ListFirewallPolicies
              - network-firewall:DescribeFirewallPolicy
              - access-analyzer:ListAnalyzers
            Resource: "*"

          # -----------------------------------------------------------------
          # Web, CDN, DNS, and Certificates (CMMC: SC domain)
          # -----------------------------------------------------------------
          - Sid: WebCDNDNSRead
            Effect: Allow
            Action:
              - cloudfront:ListDistributions
              - acm:ListCertificates
              - acm:DescribeCertificate
              - route53:ListHostedZones
              - route53:GetDNSSEC
              - apigateway:GET
              - ecr:DescribeRepositories
            Resource: "*"

          # -----------------------------------------------------------------
          # Identity Center, CI/CD, Athena, Health (CMMC: AC, CM, AU domains)
          # -----------------------------------------------------------------
          - Sid: IdentityCICDAnalyticsRead
            Effect: Allow
            Action:
              - sso:ListInstances
              - codepipeline:ListPipelines
              - codepipeline:GetPipeline
              - athena:ListNamedQueries
              - athena:ListWorkGroups
              - health:DescribeEvents
            Resource: "*"

  # =========================================================================
  # Explicit Deny — Ensure No Write Access
  # =========================================================================
  CMMCScannerDenyWritePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecuritybricksCMMCScannerDenyWrite
      Roles:
        - !Ref CMMCScannerRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyAllMutatingActions
            Effect: Deny
            Action:
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:StopInstances
              - ec2:StartInstances
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - s3:PutObject
              - s3:DeleteObject
              - s3:DeleteBucket
              - s3:PutBucketPolicy
              - rds:DeleteDBInstance
              - rds:CreateDBInstance
              - rds:ModifyDBInstance
              - iam:CreateUser
              - iam:DeleteUser
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:InvokeFunction
              - cloudformation:CreateStack
              - cloudformation:DeleteStack
              - cloudformation:UpdateStack
            Resource: "*"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RoleArn:
    Description: >-
      Provide this ARN to Securitybricks to complete onboarding.
      This is the cross-account role that the CMMC Scanner will assume.
    Value: !GetAtt CMMCScannerRole.Arn

  ExternalIdUsed:
    Description: External ID configured for this role
    Value: !Ref ExternalId

  RoleName:
    Description: Name of the IAM role created
    Value: !Ref RoleName

  SetupInstructions:
    Description: Next steps after deploying this template
    Value: !Sub >-
      Role created successfully. Provide the Role ARN
      (${CMMCScannerRole.Arn}) to your Securitybricks contact.
      They will configure it in the CMMC Scanner platform for
      your organization. The scanner will use External ID
      '${ExternalId}' when assuming this role.
